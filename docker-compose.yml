services:
  db:
    image: postgres:16-alpine
    container_name: mentor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentor
    ports:
      - "5432:5432"
    volumes:
      - mentor_pgdata:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mentor_pgdata:
